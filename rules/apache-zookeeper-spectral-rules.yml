# Apache ZooKeeper API Spectral Rules
rules:

  info-title-required:
    description: Info title is required
    severity: error
    given: "$.info"
    then:
      field: title
      function: truthy

  info-version-required:
    description: API version is required
    severity: error
    given: "$.info"
    then:
      field: version
      function: truthy

  servers-required:
    description: Servers array must be defined
    severity: error
    given: "$"
    then:
      field: servers
      function: truthy

  operation-summary-required:
    description: All operations must have a summary
    severity: error
    given: "$.paths[*][get,post,put,patch,delete]"
    then:
      field: summary
      function: truthy

  operation-operationid-required:
    description: All operations must have an operationId
    severity: error
    given: "$.paths[*][get,post,put,patch,delete]"
    then:
      field: operationId
      function: truthy

  operation-summary-prefix:
    description: Operation summaries should start with "Apache ZooKeeper"
    severity: info
    given: "$.paths[*][get,post,put,patch,delete].summary"
    then:
      function: pattern
      functionOptions:
        match: "^Apache ZooKeeper"

  response-success-required:
    description: Every operation should have at least one 2xx response
    severity: error
    given: "$.paths[*][get,post,put,patch,delete].responses"
    then:
      function: schema
      functionOptions:
        schema:
          anyOf:
            - required: ['200']
            - required: ['201']
            - required: ['204']

  response-description-required:
    description: All responses must have a description
    severity: error
    given: "$.paths[*][get,post,put,patch,delete].responses[*]"
    then:
      field: description
      function: truthy

  operation-tags-required:
    description: All operations should have at least one tag
    severity: warn
    given: "$.paths[*][get,post,put,patch,delete]"
    then:
      field: tags
      function: truthy

  paths-kebab-case:
    description: Path segments should use kebab-case or be simple command names
    severity: info
    given: "$.paths[*]~"
    then:
      function: pattern
      functionOptions:
        match: "^(/[a-z0-9_-]+)+$"
