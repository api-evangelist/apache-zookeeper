apis:
  - aid: apache-zookeeper:apache-zookeeper-admin-api
    name: Apache ZooKeeper Admin Server API
    description: >-
      The ZooKeeper Admin Server provides HTTP endpoints on port 8080 that expose the four-letter-word
      equivalent commands as REST endpoints for cluster monitoring, configuration, and diagnostics.
      Endpoints include /commands/conf (server configuration), /commands/stats (server statistics),
      /commands/mntr (monitoring metrics), /commands/envi (environment info), /commands/dump
      (session/ephemeral node dump), /commands/crst (connection reset), and /commands/leader
      (leader info for QuorumPeerMain).
    humanURL: https://zookeeper.apache.org/doc/current/zookeeperAdmin.html#sc_4lw
    baseURL: http://localhost:8080/commands
    tags:
      - REST
      - Admin
      - Monitoring
      - Cluster Management
    properties:
      - type: Documentation
        url: https://zookeeper.apache.org/doc/current/zookeeperAdmin.html#sc_4lw
      - type: OpenAPI
        url: openapi/zookeeper-admin-api.yml
  - aid: apache-zookeeper:apache-zookeeper-client-api
    name: Apache ZooKeeper Client API
    description: >-
      The ZooKeeper client API provides Java and C language bindings for distributed coordination
      operations. Operations include create (create znodes), delete, exists (check existence), getData,
      setData, getChildren, getACL, setACL, and multi (batch operations). Watch mechanisms notify
      clients of znode changes. Curator is the recommended high-level Java client with recipes for
      distributed locks, leader elections, service discovery, and caches.
    humanURL: https://zookeeper.apache.org/doc/current/zookeeperProgrammers.html
    tags:
      - Java
      - C
      - Coordination
      - Leader Election
    properties:
      - type: Documentation
        url: https://zookeeper.apache.org/doc/current/zookeeperProgrammers.html
      - type: APIReference
        url: https://zookeeper.apache.org/doc/current/apidocs/zookeeper-server/
