aid: apache-zookeeper
name: Apache ZooKeeper
description: >-
  Apache ZooKeeper is a centralized service for maintaining configuration information, naming,
  providing distributed synchronization, and providing group services for distributed systems.
  It provides a hierarchical key-value store (znodes), watches for change notifications, ephemeral
  nodes for presence detection, and sequential nodes for leader election and distributed locking.
  ZooKeeper exposes a Java/C client API and an HTTP Admin Server API for monitoring and management.
  It is widely used by Kafka, Hadoop, HBase, Storm, and other distributed systems.
type: Index
position: Consumer
access: 3rd-Party
